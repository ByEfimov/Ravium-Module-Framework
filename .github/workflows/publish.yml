name: Publish npm packages

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.22.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: npm install -g npm@latest
      - run: pnpm install --frozen-lockfile
      - run: pnpm run check
      - run: npm publish ./packages/module-sdk --access public --provenance
      - run: npm publish ./packages/cli --access public --provenance
